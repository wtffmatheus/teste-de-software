name: Testes com Pytest

# Gatilhos: sempre que houver push ou pull request na branch main
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest   # Máquina virtual Linux limpa
    steps:
      - uses: actions/checkout@v3   # Faz checkout do código

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'    # Versão do Python usada nos testes

      - name: Instalar dependências
        run: pip install pytest pytest-cov

      - name: Executar Pytest
        run: pytest --cov=cadastro --cov-report=term-missing
