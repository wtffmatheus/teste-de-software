name: Entrega Final CEP dia 20/03

on:
  push:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar codigo
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v3
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install pytest jinja2

    - name: Rodar Testes
      run: |
        python -m pytest --junitxml=resultado_testes.xml

    - name: Gerar Relatorio
      if: always()
      run: |
        python gera_relatorio.py

    - name: Enviar E-mail de Entrega
      if: always()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ secrets.EMAIL }}
        password: ${{ secrets.SENHAMAIL }}
        subject: "ENTREGA: Relatorio de Testes - Matheus Trindade"
        to: "user.matheus168@gmail.com"  # <--- COLOQUE SEU EMAIL AQUI PARA TESTAR AGORA
        from: "Automacao GitHub"
        body: "Relatório de testes em anexo."
        attachments: termo_de_aceite.html